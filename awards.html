		<style>
			.awards-page .home-shell { gap: 22px; }
			.awards-hero { position: relative; overflow: hidden; padding: 42px; border-radius: 38px; border: 1px solid rgba(255,255,255,0.68); background: radial-gradient(circle at top right, rgba(255,208,110,0.22), transparent 28%), linear-gradient(180deg, rgba(255,252,247,0.94) 0%, rgba(255,252,247,0.76) 100%); box-shadow: 0 32px 80px rgba(17,24,39,0.14); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); }

			.awards-hero > * { position: relative; z-index: 1; }
			.hero-topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }
			.locale-switch { display: inline-flex; gap: 8px; padding: 6px; border-radius: 999px; background: rgba(21,21,21,0.05); border: 1px solid rgba(21,21,21,0.06); }
			.locale-switch button { border: 0; background: transparent; color: #5d5954; font: inherit; font-size: 0.84rem; font-weight: 800; padding: 9px 14px; border-radius: 999px; cursor: pointer; }
			.locale-switch button.is-active { background: #151515; color: #ffffff; }
			.awards-heading { margin: 16px 0 12px 0; font-size: clamp(3rem, 6vw, 5.2rem); line-height: 0.94; letter-spacing: -0.07em; font-weight: 800; }
			.awards-heading span { display: block; font-family: "Instrument Serif", Georgia, serif; font-style: italic; font-weight: 400; }
			.awards-description { margin: 0; max-width: 760px; font-size: 1.08rem; line-height: 1.9; color: #6e6a65; }
			.awards-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 22px; }
			.award-card { position: relative; height: 320px; padding: 26px; display: flex; flex-direction: column; justify-content: space-between; overflow: hidden; border-radius: 30px; border: 1px solid rgba(255,255,255,0.6); background: linear-gradient(180deg, rgba(20,22,30,0.94) 0%, rgba(31,36,49,0.92) 100%); box-shadow: 0 22px 56px rgba(9,12,18,0.22); transform-style: preserve-3d; will-change: transform; transition: transform 240ms ease, box-shadow 240ms ease, border-color 240ms ease; }
			.award-card:before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(255,208,110,0.18), transparent 30%), linear-gradient(150deg, rgba(255,255,255,0.08), transparent 42%); pointer-events: none; }
			.award-card:after { content: ""; position: absolute; inset: 1px; border-radius: 29px; border: 1px solid rgba(255,255,255,0.06); pointer-events: none; }
			.award-card:hover { transform: translateY(-6px); box-shadow: 0 30px 72px rgba(9,12,18,0.28); border-color: rgba(255,208,110,0.24); }
			.award-card > * { position: relative; z-index: 1; }
			.award-top { display: flex; align-items: center; justify-content: space-between; gap: 14px; }
			.award-badge { display: inline-flex; align-items: center; justify-content: center; width: 58px; height: 58px; border-radius: 18px; background: linear-gradient(180deg, rgba(255,221,150,0.26), rgba(255,193,77,0.12)); border: 1px solid rgba(255,223,157,0.18); color: #ffd27a; font-size: 1.55rem; box-shadow: inset 0 1px 0 rgba(255,255,255,0.14); }
			.award-year { display: inline-flex; align-items: center; padding: 8px 14px; border-radius: 999px; background: rgba(255,255,255,0.07); color: #ffffff; font-size: 0.84rem; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; }
			.award-title { margin: 22px 0 12px 0; font-size: 1.36rem; line-height: 1.32; letter-spacing: -0.03em; color: #ffffff !important; font-weight: 700; }
			.award-tier { margin-top: 22px; display: inline-flex; align-items: center; align-self: flex-start; padding: 10px 14px; border-radius: 999px; background: rgba(255,208,110,0.12); border: 1px solid rgba(255,208,110,0.16); color: #ffffff; font-size: 0.84rem; font-weight: 700; letter-spacing: 0.03em; }
			.awards-page .contact-panel .section-label, .awards-page .contact-panel p, .awards-page #sidebar a, .awards-page #copyright { color: inherit; }
			@media screen and (max-width: 1280px) { .awards-grid { grid-template-columns: repeat(2, minmax(0,1fr)); } }
