		<link rel="stylesheet" href="css/homepage-redesign.css" />
		<style>
			.publications-page .home-shell { gap: 20px; }
			.publications-page .publications-hero { position: relative; overflow: hidden; padding: 40px 42px; background: linear-gradient(180deg, rgba(255,252,247,0.94) 0%, rgba(255,252,247,0.72) 100%); border: 1px solid rgba(255,255,255,0.72); border-radius: 36px; box-shadow: 0 32px 80px rgba(17,24,39,0.14); backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px); }
			.publications-page .publications-hero:before { content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.62), rgba(255,255,255,0.1)); pointer-events: none; }
			.publications-page .publications-hero > * { position: relative; z-index: 1; }
			.hero-topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }
			.locale-switch { display: inline-flex; gap: 8px; padding: 6px; border-radius: 999px; background: rgba(21,21,21,0.05); border: 1px solid rgba(21,21,21,0.06); }
			.locale-switch button { border: 0; background: transparent; color: #5d5954; font: inherit; font-size: 0.84rem; font-weight: 800; padding: 9px 14px; border-radius: 999px; cursor: pointer; }
			.locale-switch button.is-active { background: #151515; color: #ffffff; }
			.publications-page .hero-heading { margin: 16px 0 10px 0; font-size: clamp(2.8rem, 6vw, 5rem); line-height: 0.95; letter-spacing: -0.06em; font-weight: 800; }
			.publications-page .hero-heading span { display: block; font-family: "Instrument Serif", Georgia, serif; font-weight: 400; font-style: italic; letter-spacing: -0.03em; }
			.publications-page .hero-description { margin: 0; max-width: 760px; font-size: 1.08rem; line-height: 1.9; color: #6e6a65; }
			.publications-list { display: grid; gap: 18px; }
			.publication-card { position: relative; overflow: hidden; background: linear-gradient(180deg, rgba(255,252,247,0.92) 0%, rgba(255,252,247,0.74) 100%); border: 1px solid rgba(255,255,255,0.72); border-radius: 30px; box-shadow: 0 20px 56px rgba(17,24,39,0.1); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease; }
			.publication-card:before { content: ""; position: absolute; inset: 0; background: linear-gradient(135deg, rgba(255,255,255,0.58), rgba(255,255,255,0.12)); pointer-events: none; }
			.publication-card > * { position: relative; z-index: 1; }
			.publication-card:hover { transform: translateY(-2px); box-shadow: 0 28px 64px rgba(17,24,39,0.12); border-color: rgba(49,87,213,0.18); }
			.publication-toggle { width: 100%; padding: 28px 32px; border: 0; background: transparent; text-align: left; cursor: pointer; display: grid; grid-template-columns: minmax(0,1fr) auto; gap: 22px; }
			.publication-main { min-width: 0; }
			.publication-title { margin: 0 0 18px 0; font-size: 1.42rem; line-height: 1.35; letter-spacing: -0.03em; font-weight: 700; color: #151515; }
			.publication-meta { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; }
			.meta-block { min-width: 0; }
			.meta-label { display: block; margin-bottom: 6px; font-size: 0.72rem; font-weight: 800; letter-spacing: 0.18em; text-transform: uppercase; color: rgba(21,21,21,0.45); }
			.meta-value { display: block; font-size: 0.97rem; line-height: 1.7; color: #4e4a46; }
			.publication-year { align-self: start; display: inline-flex; align-items: center; justify-content: center; min-width: 92px; padding: 12px 16px; border-radius: 999px; background: rgba(49,87,213,0.1); color: #3157d5; font-size: 0.94rem; font-weight: 800; letter-spacing: 0.04em; }
			.publication-panel { display: none; }
			.publication-panel-inner { overflow: hidden; }
			.publication-content { display: grid; grid-template-columns: minmax(0,1.1fr) minmax(280px,0.72fr); gap: 26px; padding: 0 32px 32px 32px; }
			.publication-body { padding-top: 8px; border-top: 1px solid rgba(21,21,21,0.08); }
			.publication-body p { margin: 18px 0 0 0; font-size: 1rem; line-height: 1.95; color: #4e4a46; text-align: justify; }
			.publication-links { margin-top: 18px; display: flex; flex-wrap: wrap; gap: 12px; }
			.publication-link { display: inline-flex; align-items: center; gap: 10px; padding: 12px 16px; border-radius: 999px; background: rgba(49,87,213,0.08); border: 1px solid rgba(49,87,213,0.12); font-size: 0.94rem; font-weight: 700; color: #3157d5; }
			.publication-figure { padding-top: 8px; }
			.publication-figure img { display: block; width: 100%; border-radius: 24px; box-shadow: 0 20px 48px rgba(17,24,39,0.12); }
			.publication-card.is-open .publication-title { color: #3157d5; }
			.publication-card.is-open .publication-year { background: rgba(49,87,213,0.14); }
			.publication-card.is-open .publication-chevron { transform: rotate(45deg); }
			.publication-chevron { position: relative; width: 18px; height: 18px; margin-left: 10px; transition: transform 320ms cubic-bezier(.22, 1, .36, 1); }
			.publication-chevron:before, .publication-chevron:after { content: ""; position: absolute; left: 50%; top: 50%; width: 16px; height: 2px; background: #3157d5; border-radius: 999px; transform: translate(-50%, -50%); }
			.publication-chevron:after { transform: translate(-50%, -50%) rotate(90deg); }
			.publications-page .contact-panel .section-label, .publications-page .contact-panel p, .publications-page #sidebar a, .publications-page #copyright { color: inherit; }
			@media screen and (max-width: 1200px) { .publication-content { grid-template-columns: 1fr; } }
			@media screen and (max-width: 900px) { .publication-meta { grid-template-columns: 1fr; } }
			@media screen and (max-width: 736px) { .publications-page .publications-hero { padding: 24px 22px; border-radius: 28px; } .hero-topbar { flex-direction: column; align-items: flex-start; } .publication-toggle { padding: 22px; grid-template-columns: 1fr; } .publication-year { min-width: 0; justify-self: start; } .publication-title { font-size: 1.16rem; } .publication-content { padding: 0 22px 22px 22px; } }
		</style>
