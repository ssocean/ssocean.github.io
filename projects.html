		<style>
			.projects-page .home-shell { gap: 22px; }

			.projects-hero > * { position: relative; z-index: 1; }
			.hero-topbar { display: flex; align-items: flex-start; justify-content: space-between; gap: 18px; }

			.locale-switch button.is-active { background: #151515; color: #ffffff; }
			.projects-heading { margin: 16px 0 12px 0; font-size: clamp(3rem, 6vw, 5.2rem); line-height: 0.94; letter-spacing: -0.07em; font-weight: 800; }
			.projects-heading span { display: block; font-family: "Instrument Serif", Georgia, serif; font-style: italic; font-weight: 400; }
			.projects-description { margin: 0; max-width: 780px; font-size: 1.08rem; line-height: 1.9; color: #6e6a65; }
			.projects-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 22px; }
			.project-card { position: relative; overflow: hidden; padding: 28px; border-radius: 30px; border: 1px solid rgba(255,255,255,0.68); background: linear-gradient(180deg, rgba(255,252,247,0.94) 0%, rgba(255,252,247,0.78) 100%); box-shadow: 0 20px 56px rgba(17,24,39,0.1); backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px); transition: transform 220ms ease, box-shadow 220ms ease, border-color 220ms ease; }
			.project-card:before { content: ""; position: absolute; inset: 0; background: radial-gradient(circle at top right, rgba(80,132,255,0.12), transparent 28%), linear-gradient(135deg, rgba(255,255,255,0.55), rgba(255,255,255,0.1)); pointer-events: none; }
			.project-card > * { position: relative; z-index: 1; }
			.project-card:hover { transform: translateY(-4px); box-shadow: 0 28px 68px rgba(17,24,39,0.13); border-color: rgba(49,87,213,0.18); }
			.project-top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 18px; }
			.project-type { display: inline-flex; align-items: center; padding: 8px 14px; border-radius: 999px; background: rgba(49,87,213,0.08); border: 1px solid rgba(49,87,213,0.12); color: #3157d5; font-size: 0.8rem; font-weight: 800; letter-spacing: 0.08em; text-transform: uppercase; }
			.project-time { font-size: 0.88rem; font-weight: 700; color: #6e6a65; }
			.project-title { margin: 0 0 14px 0; font-size: 1.42rem; line-height: 1.3; letter-spacing: -0.03em; color: #151515; }
			.project-desc { margin: 0; font-size: 0.98rem; line-height: 1.9; color: #4e4a46; }
			.project-meta { margin-top: 20px; display: flex; flex-wrap: wrap; gap: 10px; }
			.project-chip { display: inline-flex; align-items: center; padding: 10px 14px; border-radius: 999px; background: rgba(21,21,21,0.04); border: 1px solid rgba(21,21,21,0.06); font-size: 0.88rem; font-weight: 600; color: #3f3b37; }
			.project-links { margin-top: 22px; display: flex; flex-wrap: wrap; gap: 12px; }
			.project-link { display: inline-flex; align-items: center; padding: 11px 16px; border-radius: 999px; background: rgba(49,87,213,0.08); border: 1px solid rgba(49,87,213,0.12); font-size: 0.92rem; font-weight: 700; color: #3157d5; }
			.projects-page .contact-panel .section-label, .projects-page .contact-panel p, .projects-page #sidebar a, .projects-page #copyright { color: inherit; }
			@media screen and (max-width: 1100px) { .projects-grid { grid-template-columns: 1fr; } }
